<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Moechat</title>

<style>

body{
	margin:0;
	font-family:Verdana;
	background:#0b3d91;
}

.header{
	background:#1c4fa3;
	display:flex;
	justify-content:space-between;
	align-items:center;
}

.nav{
	display:flex;
	flex-wrap:wrap;
}

.nav a{
	color:white;
	padding:12px 18px;
	text-decoration:none;
}

.createBtn{
	background:#2b6fff;
	color:white;
	border:none;
	padding:12px 18px;
}

.banner{
	width:768px;
	height:80px;
	display:block;
	object-fit:cover;
}

.container{
	max-width:1200px;
	margin:auto;
	padding:10px;
}

.post,
.create{
	background:white;
	padding:10px;
	margin-bottom:10px;
	border:1px solid #888;
}

.create{
	display:none;
}

.post-title{
	font-size:18px;
	font-weight:bold;
	color:#0055aa;
}

.post-meta{
	font-size:12px;
	color:#666;
	margin-top:4px;
}

.post-content{
	margin-top:8px;
}

input,
textarea{
	width:100%;
	box-sizing:border-box;
	padding:8px;
	margin-top:5px;
	margin-bottom:10px;
}

button{
	cursor:pointer;
}

.vote{
	font-size:18px;
	cursor:pointer;
	user-select:none;
	padding:0 4px;
}

.score{
	color:#ff4500;
	font-weight:bold;
}

.active{
	color:#ff0000;
}

</style>
</head>

<body>

<header class="header">

<nav class="nav">
<a href="https://frostcat224.github.io/moechat/">Home</a>
<a href="https://frostcat224.github.io/moechat/top">Top</a>
<a href="https://frostcat224.github.io/moechat/bottom">Bottom</a>
<a href="https://frostcat224.github.io/moechat/recent">Recent</a>
<a href="https://frostcat224.github.io/moechat/trending">Trending</a>
<a href="https://frostcat224.github.io/moechat/news">News</a>
<a href="https://frostcat224.github.io/moechat/forums">Forums</a>
</nav>

<button
id="toggleCreate"
class="createBtn">
＋ Post
</button>

</header>

<img
class="banner"
src="https://frostcat224.github.io/moechat/banners/logo.png"
alt="Banner">

<div class="container">

<div
class="create"
id="createBox">

<h3>Create Post</h3>

<input
id="author"
placeholder="Username">

<input
id="title"
placeholder="Title">

<textarea
id="content"
rows="5"
placeholder="Content">
</textarea>

<button id="submit">
Post
</button>

</div>

<div id="posts">
Loading...
</div>

</div>

<script type="module">

import {
	initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
	getDatabase,
	ref,
	onValue,
	push,
	set,
	update,
	get
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig={
	apiKey:"AIzaSyA75yvmawdHgeaHz0seDhGC5exvS-teIpc",
	authDomain:"moechat-224.firebaseapp.com",
	databaseURL:"https://moechat-224-default-rtdb.europe-west1.firebasedatabase.app",
	projectId:"moechat-224",
	storageBucket:"moechat-224.firebasestorage.app",
	messagingSenderId:"147503997820",
	appId:"1:147503997820:web:1bb59dc4936825af87baf9",
	measurementId:"G-R6MRNWQGZ2"
};

const app=
initializeApp(firebaseConfig);

const db=
getDatabase(app);

const postsDiv=
document.getElementById("posts");

document
.getElementById("toggleCreate")
.onclick=()=>{

	const box=
	document.getElementById("createBox");

	box.style.display=
	box.style.display==="block"
	? "none"
	: "block";

};

function formatDate(ts){

	return new Date(ts)
	.toLocaleString();

}

const titleInput=
document.getElementById("title");

const contentInput=
document.getElementById("content");

const authorInput=
document.getElementById("author");

document
.getElementById("submit")
.onclick=
async()=>{

	const title=
	titleInput.value.trim();

	const content=
	contentInput.value.trim();

	const author=
	authorInput.value.trim();

	if(!title||!content){

		alert("Fill everything");
		return;

	}

	const newPost=
	push(
		ref(db,"posts")
	);

	await set(
		newPost,
		{
			title,
			content,
			author:
			author||
			"Anonymous",
			score:0,
			timestamp:
			Date.now()
		}
	);

	titleInput.value="";
	contentInput.value="";
	authorInput.value="";

};

async function vote(
	id,
	type
){

	const key=
	"vote_"+id;

	const old=
	localStorage
	.getItem(key);

	if(old){
		return;
	}

	const postRef=
	ref(
		db,
		"posts/"+id
	);

	const snap=
	await get(postRef);

	if(!snap.exists()){
		return;
	}

	let score=
	snap.val().score||0;

	if(type==="up"){
		score++;
	}

	if(type==="down"){
		score--;
	}

	await update(
		postRef,
		{
			score
		}
	);

	localStorage
	.setItem(
		key,
		type
	);

}

window.vote=
vote;

onValue(

	ref(
		db,
		"posts"
	),

	(snapshot)=>{

	const data=
	snapshot.val();

	postsDiv.innerHTML="";

	if(!data){

		postsDiv.innerHTML=
		"No posts";

		return;

	}

	Object
	.entries(data)

	.sort(
	(a,b)=>
	b[1].timestamp-
	a[1].timestamp
	)

	.forEach(

	([id,post])=>{

	const voted=
	localStorage
	.getItem(
	"vote_"+id
	);

	postsDiv.innerHTML+=`

<div class="post">

<div class="post-title">
${post.title}
</div>

<div class="post-meta">

<span
class="vote ${voted==="up"?"active":""}"
onclick="vote('${id}','up')">
▲
</span>

<span class="score">
${post.score}
</span>

<span
class="vote ${voted==="down"?"active":""}"
onclick="vote('${id}','down')">
▼
</span>

•
posted by
${post.author}

•
${formatDate(
post.timestamp
)}

</div>

<div class="post-content">
${post.content}
</div>

</div>

`;

	});

}

);

</script>

</body>
</html>
