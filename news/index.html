<script type="module">


const POSTS_TO_SHOW = 10; 

const RANDOM_PERCENT = 0.10;

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let feedIds = null;

const postsDiv = document.getElementById("posts");

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const usernameInput = document.getElementById("username");

const statusBox = document.getElementById("status");
	const postStatus =
	document.getElementById("postStatus");

const titleInput = document.getElementById("title");
const contentInput = document.getElementById("content");


document.getElementById("toggleAccount").onclick = () => {

	const accountBox =
		document.getElementById("accountBox");

	const createBox =
		document.getElementById("createBox");

	accountBox.style.display =
		accountBox.style.display === "block"
			? "none"
			: "block";

	createBox.style.display = "none";
};

document.getElementById("toggleCreate").onclick = () => {

	const accountBox =
		document.getElementById("accountBox");

	const createBox =
		document.getElementById("createBox");

	createBox.style.display =
		createBox.style.display === "block"
			? "none"
			: "block";

	accountBox.style.display = "none";
};

function formatDate(ts){
	return new Date(ts).toLocaleString();
}


async function usernameExists(username){

	const snap = await get(ref(db, "users"));

	if(!snap.exists()) return false;

	const users = Object.values(snap.val());

	return users.some(user =>
		user.username &&
		user.username.toLowerCase() ===
		username.toLowerCase()
	);
}
document.getElementById("register").onclick = async () => {

	try {

		const username = usernameInput.value.trim();

		if (!username) {
			alert("Enter username");
			return;
		}

		if (await usernameExists(username)) {
	alert("Username already exists");
	return;
}

		const cred = await createUserWithEmailAndPassword(
			auth,
			emailInput.value,
			passwordInput.value
		);

		await set(ref(db, "users/" + cred.user.uid), {
			username,
			email: cred.user.email
		});

	} catch (e) {
		alert(e.message);
	}
};



document.getElementById("login").onclick = async () => {
	try {
		await signInWithEmailAndPassword(
			auth,
			emailInput.value,
			passwordInput.value
		);
	} catch (e) {
		alert(e.message);
	}
};

document.getElementById("logout").onclick = () => {
	signOut(auth);
};



onAuthStateChanged(auth, async (user) => {

	if (user) {

		const snap = await get(ref(db, "users/" + user.uid));

		const username =
			snap.exists()
				? snap.val().username
				: user.email;

		const text =
			"Logged in as: " + username;

		statusBox.textContent = text;
		postStatus.textContent = text;

	} else {

		statusBox.textContent = "Not logged in";
		postStatus.textContent = "Not logged in";
	}

});


document.getElementById("submit").onclick = async () => {

	const user = auth.currentUser;

	if (!user) {
		alert("You must be logged in!!!");
		return;
	}

	const title = titleInput.value.trim();
	const content = contentInput.value.trim();
	const isNews =
	document.getElementById("isNews").checked;

	if (!title || !content) {
		alert("Fill in everything!!!");
		return;
	}

	const snap = await get(ref(db, "users/" + user.uid));

	if (!snap.exists() || !snap.val().username) {
		alert("Username missing. Please re-register.");
		return;
	}

	const username = snap.val().username;

	const newPost = push(ref(db, "posts"));

	await set(newPost, {
		title,
		content,
		author: username,
		uid: user.uid,
		score: 0,
		timestamp: Date.now(),
		isNews
	});

	titleInput.value = "";
	contentInput.value = "";
	document.getElementById("isNews").checked = false;
};

async function vote(id, type){

	const key = "vote_" + id;

	if (localStorage.getItem(key)) return;

	const postRef = ref(db, "posts/" + id);
	const snap = await get(postRef);

	if (!snap.exists()) return;

	let score = snap.val().score || 0;

	if (type === "up") score++;
	if (type === "down") score--;

	await update(postRef, { score });

	localStorage.setItem(key, type);
}

window.vote = vote;

let ownerUsers = [];
let adminUsers = [];
let verifiedUsers = [];

async function loadBadges(){

	try{

		ownerUsers =

			await fetch(
				"https://frostcat224.github.io/moechat/important/admins.txt"
			);

		adminUsers =
			(await admin.text())
			.split("\n")
			.map(v=>v.trim());

		const verified =
			await fetch(
				"https://frostcat224.github.io/moechat/important/verified.txt"
			);

		verifiedUsers =
			(await verified.text())
			.split("\n")
			.map(v=>v.trim());

	}catch{}
}

height:1em;

">`;

	if(adminUsers.includes(user)){
		html += `
<img

style="

vertical-align:middle;
margin-left:2px;

	}

	if(verifiedUsers.includes(user)){

src="https://frostcat224.github.io/moechat/banners/verified.png"
style="

vertical-align:middle;
margin-left:2px;

loadBadges();
onValue(ref(db, "posts"), async (snapshot) => {

	const data = snapshot.val();

	postsDiv.innerHTML = "";

	if (!data) {
		postsDiv.innerHTML = "No posts";
		return;
	}

	let posts = Object.entries(data);


let selected = posts
	.filter(([id, post]) => post.isNews === true)
	.sort((a, b) =>
		(b[1].timestamp || 0) -
		(a[1].timestamp || 0)
	)
	.slice(0, POSTS_TO_SHOW);


	let html = "";

	for (const [id, post] of selected) {

		const voted = localStorage.getItem("vote_" + id);
		const comments =
	await get(ref(db,"comments/"+id));

const commentCount =
	comments.exists()
	? Object.keys(
		comments.val()
	).length
	: 0;

		html += `
<div class="post">

<div class="post-title"
onclick="location.href='https://frostcat224.github.io/moechat/post?id=${id}'">
${post.title}
</div>

<div class="post-meta">

<span class="vote ${voted==="up"?"active":""}"
onclick="vote('${id}','up')">▲</span>

<span class="score">${post.score || 0}</span>

<span class="vote ${voted==="down"?"active":""}"
onclick="vote('${id}','down')">▼</span>

• posted by ${post.author}${getBadges(post.author)}

•

${post.isNews ? `
<img
src="https://frostcat224.github.io/moechat/banners/news.png"
style="
height:1em;
vertical-align:middle;
margin-right:4px;
">
` : ""}

${formatDate(post.timestamp)}

•

<span
style="
cursor:pointer;
color:#0055aa;
"
onclick="
location.href=
'https://frostcat224.github.io/moechat/post?id=${id}'
">

 ${commentCount}
comment${commentCount===1?"":"s"}

</span>

</div>

<div class="post-content">
${post.content}
</div>

</div>
`;
	}

	postsDiv.innerHTML = html;
});
</script>
